<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美里店 朝礼・予定管理</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --bg: #fff8f5;
    --surface: #ffffff;
    --border: #ffd6c8;
    --accent: #ff7eb3;
    --accent2: #ff9a5c;
    --accent3: #5cd4a8;
    --text: #1a1010;
    --text-muted: #6b4f4f;
    --text-dim: #9a7a7a;
    --shadow: rgba(255,126,179,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image: radial-gradient(circle at 10% 10%, #ffe8f5 0%, transparent 50%),
                      radial-gradient(circle at 90% 90%, #e8f0ff 0%, transparent 50%);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 20px 24px;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding-bottom: 14px; border-bottom: 2px dashed var(--border);
    position: sticky; top: 0; z-index: 101;
    background: rgba(255,248,245,0.97); backdrop-filter: blur(10px);
  }
  .header-left h1 {
    font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header-left .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  #clock { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 800; color: var(--accent); text-align:right; }
  #datestr { font-size: 11px; color: var(--text-muted); text-align:right; margin-top: 1px; }

  /* 担当者バー */
  .who-bar {
    background: var(--surface); border: 2px solid var(--border); border-radius: 16px;
    padding: 12px 16px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    box-shadow: 0 4px 16px var(--shadow);
  }
  .who-label { font-size: 11px; color: var(--text-muted); font-weight: 700; white-space: nowrap; }
  .staff-pills { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .staff-pill {
    padding: 5px 14px; border-radius: 20px; border: 2px solid var(--border);
    font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-muted);
    background: var(--bg); font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }
  .staff-pill:hover { border-color: var(--accent); color: var(--accent); }
  .staff-pill.active { color: #fff; font-weight: 700; }
  .me-hint { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

  /* アラート */
  .alert-bar {
    background: #fff0f0; border: 2px solid #ffc5c5; border-radius: 12px;
    padding: 10px 16px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .alert-bar.hidden { display: none; }
  .time-alert {
    background: linear-gradient(135deg, #fff3e0, #fff0f0);
    border: 2px solid #ffaa55; border-radius: 12px;
    padding: 12px 16px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .time-alert.hidden { display: none; }
  .alert-title { font-size: 13px; font-weight: 700; color: #ff5555; }
  .time-alert-title { font-size: 13px; font-weight: 700; color: #ff7700; }
  .alert-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .alert-chip {
    padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: 700;
    background: #ffe0e0; color: #ff5555; border: 1px solid #ffb5b5;
  }

  /* ツールバー */
  .toolbar { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
  .back-btn {
    padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border);
    background: var(--surface); color: var(--text-muted); font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* sync */
  .sync-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; font-size: 11px; color: var(--text-muted); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent3); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* セクション */
  .section {
    background: var(--surface); border: 2px solid var(--border); border-radius: 16px;
    padding: 16px; margin-bottom: 16px; box-shadow: 0 4px 16px var(--shadow);
  }
  .section-title {
    font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800;
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .date-label { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-left: auto; }
  .reset-btn-sm {
    padding: 3px 10px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg); font-size: 11px; font-weight: 600; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; color: var(--text-muted); transition: all 0.15s;
  }
  .reset-btn-sm:hover { border-color: #ff7070; color: #ff7070; }

  /* テーブル */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: var(--bg); padding: 8px 12px; text-align: center;
    font-weight: 700; color: var(--text-muted); border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }
  th.name-col { text-align: left; }
  td { padding: 8px 12px; text-align: center; border-bottom: 1px dashed var(--border); vertical-align: middle; }
  td.name-col { text-align: left; font-weight: 700; }
  tr:last-child td { border-bottom: none; }
  tr.total-row td {
    background: linear-gradient(135deg, #fff0f8, #fff8f0);
    font-weight: 800; border-top: 2px solid var(--border); color: var(--accent);
  }

  .num-input {
    width: 52px; padding: 4px 6px; border-radius: 8px;
    border: 2px solid var(--border); background: var(--bg);
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
    text-align: center; color: var(--text); outline: none; transition: border-color 0.15s;
  }
  .num-input:focus { border-color: var(--accent); }

  .total-badge {
    display: inline-block; padding: 3px 10px; border-radius: 10px; font-weight: 800; font-size: 14px;
  }
  .badge-pink { background: #ffe8f5; color: var(--accent); }
  .badge-blue { background: #e8f0ff; color: #5c7ebf; }
  .badge-green { background: #e8fff8; color: #3a9e7a; }
  .badge-yellow { background: #fffde8; color: #9e7a1a; }

  .staff-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 10px; font-size: 13px; font-weight: 700;
  }
  .staff-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* 提出 */
  .submit-section {
    background: var(--surface); border: 2px solid var(--accent3); border-radius: 16px;
    padding: 16px; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(92,212,168,0.1);
  }
  .submit-title {
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800;
    color: var(--accent3); margin-bottom: 10px;
  }
  .submitted-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; min-height: 28px; align-items: center; }
  .submitted-chip {
    padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: 700;
  }
  .submit-btn {
    padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 700;
    border: none; color: #fff; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s; box-shadow: 0 3px 10px rgba(92,212,168,0.3);
  }
  .submit-btn.today-btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: 0 3px 10px var(--shadow); }
  .submit-btn.tomorrow-btn { background: linear-gradient(135deg, var(--accent3), #3ab890); }
  .submit-btn.done { background: linear-gradient(135deg, #ccc, #aaa); box-shadow: none; cursor: default; }
  .submit-btn:hover:not(.done) { opacity: 0.88; transform: translateY(-1px); }
  .submit-note { font-size: 11px; color: var(--text-muted); margin-left: 10px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>📊 美里店 朝礼・予定管理</h1>
    <div class="sub">MISATO BRANCH · MORNING REPORT</div>
  </div>
  <div>
    <div id="clock">--:--</div>
    <div id="datestr">----/--/--</div>
  </div>
</header>

<!-- 担当者選択 -->
<div class="who-bar">
  <span class="who-label">👤 あなたは？</span>
  <div class="staff-pills" id="staffPills"></div>
  <span class="me-hint" id="meHint">名前を選んでください</span>
</div>

<div class="sync-bar">
  <div class="sync-dot" id="syncDot"></div>
  <span id="syncText">接続中...</span>
</div>

<!-- 18時アラート -->
<div class="time-alert hidden" id="timeAlert">
  <span class="time-alert-title">🕕 18:00を過ぎました！翌日予定を提出してから退勤してください</span>
  <div class="alert-chips" id="timeAlertChips"></div>
</div>

<!-- 未提出アラート -->
<div class="alert-bar hidden" id="alertBar">
  <span class="alert-title">⚠️ 翌日予定未提出：</span>
  <div class="alert-chips" id="alertChips"></div>
</div>

<div class="toolbar">
  <button class="back-btn" onclick="window.location.href='index.html'">← ダッシュボードへ</button>
</div>

<!-- 本日予定テーブル -->
<div class="section">
  <div class="section-title" style="color:var(--accent)">
    📅 本日予定
    <span class="date-label" id="todayLabel"></span>
    <button class="reset-btn-sm" onclick="resetTable('today')">🔄 リセット</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="name-col">担当者</th>
          <th>面談</th><th>案内</th><th>契約</th><th>写真撮り</th>
        </tr>
      </thead>
      <tbody id="todayBody"></tbody>
    </table>
  </div>
</div>

<!-- 本日提出 -->
<div class="submit-section">
  <div class="submit-title">✅ 本日予定 提出状況</div>
  <div class="submitted-chips" id="todaySubmittedChips">
    <span style="color:var(--text-dim);font-size:12px">まだ誰も提出していません</span>
  </div>
  <button class="submit-btn today-btn" id="todaySubmitBtn" onclick="submitToday()">📤 本日予定を提出する</button>
  <span class="submit-note">※0件の場合もこのボタンを押してください</span>
</div>

<!-- 翌日予定テーブル -->
<div class="section">
  <div class="section-title" style="color:#7eb3ff">
    📆 翌日予定
    <span class="date-label" id="tomorrowLabel"></span>
    <button class="reset-btn-sm" onclick="resetTable('tomorrow')">🔄 リセット</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="name-col">担当者</th>
          <th>面談</th><th>案内</th><th>契約</th><th>写真撮り</th>
        </tr>
      </thead>
      <tbody id="tomorrowBody"></tbody>
    </table>
  </div>
</div>

<!-- 翌日提出 -->
<div class="submit-section">
  <div class="submit-title">✅ 翌日予定 提出状況</div>
  <div class="submitted-chips" id="tomorrowSubmittedChips">
    <span style="color:var(--text-dim);font-size:12px">まだ誰も提出していません</span>
  </div>
  <button class="submit-btn tomorrow-btn" id="tomorrowSubmitBtn" onclick="submitTomorrow()">📤 翌日予定を提出する</button>
  <span class="submit-note">※0件の場合もこのボタンを押してください</span>
</div>

<script>
const firebaseConfig = { databaseURL: "https://misato-dashboard-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const COLORS = ['#ff7eb3','#ff9a5c','#5cd4a8','#7eb3ff','#c47eff','#ffcc5c','#ff7070','#a0c4ff'];
const FIELDS = ['面談','案内','契約','写真撮り'];
const FIELD_KEYS = ['mendan','annai','keiyaku','shashin'];
const BADGE_CLASSES = ['badge-pink','badge-blue','badge-green','badge-yellow'];
const EXCLUDE = ['榮','松田'];

let staffList = [];
let reportData = {};
let currentUser = localStorage.getItem('misato_me') || '';

// 時計
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent = pad(now.getHours()) + ':' + pad(now.getMinutes());
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('datestr').textContent =
    now.getFullYear() + '/' + pad(now.getMonth()+1) + '/' + pad(now.getDate()) + ' (' + days[now.getDay()] + ')';
}
setInterval(updateClock, 1000);
updateClock();

function dateKey(offset) {
  offset = offset || 0;
  const n = new Date();
  n.setDate(n.getDate() + offset);
  const pad = x => String(x).padStart(2,'0');
  return n.getFullYear() + '_' + pad(n.getMonth()+1) + '_' + pad(n.getDate());
}

function dateLabel(offset) {
  offset = offset || 0;
  const n = new Date();
  n.setDate(n.getDate() + offset);
  const pad = x => String(x).padStart(2,'0');
  const days = ['日','月','火','水','木','金','土'];
  return n.getFullYear() + '/' + pad(n.getMonth()+1) + '/' + pad(n.getDate()) + ' (' + days[n.getDay()] + ')';
}

// 担当者ボタン描画
function renderStaff() {
  const wrap = document.getElementById('staffPills');
  wrap.innerHTML = '';
  const filtered = staffList.filter(function(n) { return EXCLUDE.indexOf(n) === -1; });
  filtered.forEach(function(name, idx) {
    const col = COLORS[idx % COLORS.length];
    const btn = document.createElement('button');
    btn.className = 'staff-pill' + (currentUser === name ? ' active' : '');
    btn.textContent = name;
    if (currentUser === name) {
      btn.style.background = 'linear-gradient(135deg,' + col + ',' + col + 'bb)';
      btn.style.borderColor = col;
      btn.style.color = '#fff';
    }
    btn.onclick = function() {
      currentUser = name;
      localStorage.setItem('misato_me', name);
      renderStaff();
      updateSubmitUI('today');
      updateSubmitUI('tomorrow');
    };
    wrap.appendChild(btn);
  });
  document.getElementById('meHint').textContent =
    currentUser ? currentUser + ' でログイン中 🌸' : '名前を選んでください';
}

// Firebase
function init() {
  db.ref('staff').on('value', function(snap) {
    const val = snap.val();
    staffList = val ? (Array.isArray(val) ? val : Object.values(val)) : ['榮','池田','藏下','小橋川','大西','兼本','松田','予備'];
    renderStaff();
  });

  db.ref('report').on('value', function(snap) {
    reportData = snap.val() || {};

    // 自動引き継ぎ
    const todayKey_ = dateKey(0);
    const yestKey = dateKey(-1);
    const todayData = reportData[todayKey_];
    const yestTomorrowData = reportData[yestKey];
    const todayHasData = todayData && Object.values(todayData).some(function(s) {
      return Object.values(s).some(function(v) { return v > 0; });
    });
    if (!todayHasData && yestTomorrowData) {
      const updates = {};
      Object.entries(yestTomorrowData).forEach(function(entry) {
        const name = entry[0]; const fields = entry[1];
        Object.entries(fields).forEach(function(fe) {
          updates['report/' + todayKey_ + '/' + name + '/' + fe[0]] = fe[1];
        });
      });
      db.ref().update(updates);
      setSyncOk('昨日の翌日予定を本日予定に自動引き継ぎしました ✓');
      return;
    }

    renderTable('todayBody', dateKey(0));
    renderTable('tomorrowBody', dateKey(1));
    document.getElementById('todayLabel').textContent = dateLabel(0);
    document.getElementById('tomorrowLabel').textContent = dateLabel(1);
    setSyncOk('同期済み');
    checkAlert();
    checkTimeAlert();
  });

  updateSubmitUI('today');
  updateSubmitUI('tomorrow');
}

function setSyncOk(msg) {
  document.getElementById('syncDot').className = 'sync-dot';
  document.getElementById('syncText').textContent = msg;
}

// テーブル描画
function renderTable(tbodyId, key) {
  const tbody = document.getElementById(tbodyId);
  tbody.innerHTML = '';
  const totals = {mendan:0, annai:0, keiyaku:0, shashin:0};
  const filtered = staffList.filter(function(n) { return EXCLUDE.indexOf(n) === -1; });

  filtered.forEach(function(name, idx) {
    const col = COLORS[idx % COLORS.length];
    const data = (reportData[key] && reportData[key][name]) || {};
    const tr = document.createElement('tr');
    let cells = '<td class="name-col"><span class="staff-badge" style="background:' + col + '22;color:' + col + '"><span class="staff-dot" style="background:' + col + '"></span>' + name + '</span></td>';
    FIELD_KEYS.forEach(function(fkey) {
      const val = data[fkey] || 0;
      totals[fkey] += val;
      cells += '<td><input class="num-input" type="number" min="0" value="' + val + '" data-key="' + key + '" data-name="' + name + '" data-field="' + fkey + '" data-tbody="' + tbodyId + '" onchange="updateValue(this)"></td>';
    });
    tr.innerHTML = cells;
    tbody.appendChild(tr);
  });

  // 合計行
  const totalTr = document.createElement('tr');
  totalTr.className = 'total-row';
  let totalCells = '<td class="name-col">合計</td>';
  FIELD_KEYS.forEach(function(fkey, i) {
    totalCells += '<td><span class="total-badge ' + BADGE_CLASSES[i] + '" id="total_' + tbodyId + '_' + fkey + '">' + totals[fkey] + '</span></td>';
  });
  totalTr.innerHTML = totalCells;
  tbody.appendChild(totalTr);
}

function updateValue(input) {
  const key = input.dataset.key;
  const name = input.dataset.name;
  const field = input.dataset.field;
  const tbodyId = input.dataset.tbody;
  const val = parseInt(input.value) || 0;
  db.ref('report/' + key + '/' + name + '/' + field).set(val);
  // 合計更新
  const inputs = document.querySelectorAll('#' + tbodyId + ' input[data-field="' + field + '"]');
  let total = 0;
  inputs.forEach(function(inp) { total += parseInt(inp.value) || 0; });
  const badge = document.getElementById('total_' + tbodyId + '_' + field);
  if (badge) badge.textContent = total;
}

// リセット
function resetTable(which) {
  const key = which === 'today' ? dateKey(0) : dateKey(1);
  const label = which === 'today' ? '本日予定' : '翌日予定';
  if (!confirm(label + 'をリセットしますか？')) return;
  const filtered = staffList.filter(function(n) { return EXCLUDE.indexOf(n) === -1; });
  const updates = {};
  filtered.forEach(function(name) {
    FIELD_KEYS.forEach(function(fkey) {
      updates['report/' + key + '/' + name + '/' + fkey] = 0;
    });
  });
  db.ref().update(updates).then(function() { setSyncOk(label + 'をリセットしました'); });
}

// 提出
function submitToday() {
  if (!currentUser) { alert('まず名前を選んでください'); return; }
  db.ref('submitted_today/' + dateKey(0) + '/' + currentUser).set(true);
}

function submitTomorrow() {
  if (!currentUser) { alert('まず名前を選んでください'); return; }
  db.ref('submitted/' + dateKey(1) + '/' + currentUser).set(true);
}

function updateSubmitUI(which) {
  const key = which === 'today' ? dateKey(0) : dateKey(1);
  const dbKey = which === 'today' ? 'submitted_today' : 'submitted';
  const chipsId = which === 'today' ? 'todaySubmittedChips' : 'tomorrowSubmittedChips';
  const btnId = which === 'today' ? 'todaySubmitBtn' : 'tomorrowSubmitBtn';
  const btnLabel = which === 'today' ? '📤 本日予定を提出する' : '📤 翌日予定を提出する';

  db.ref(dbKey + '/' + key).on('value', function(snap) {
    const data = snap.val() || {};
    const submitted = Object.keys(data);
    const chips = document.getElementById(chipsId);
    const btn = document.getElementById(btnId);

    if (submitted.length > 0) {
      chips.innerHTML = submitted.map(function(n, i) {
        const col = COLORS[i % COLORS.length];
        return '<span class="submitted-chip" style="background:' + col + '22;color:' + col + ';border:1px solid ' + col + '">' + n + ' ✓</span>';
      }).join('');
    } else {
      chips.innerHTML = '<span style="color:var(--text-dim);font-size:12px">まだ誰も提出していません</span>';
    }

    if (currentUser && submitted.indexOf(currentUser) >= 0) {
      btn.textContent = '✓ 提出済み';
      btn.classList.add('done');
      btn.disabled = true;
    } else {
      btn.textContent = btnLabel;
      btn.classList.remove('done');
      btn.disabled = false;
    }

    // 未提出アラート更新（翌日のみ）
    if (which === 'tomorrow') {
      const filtered = staffList.filter(function(n) { return EXCLUDE.indexOf(n) === -1; });
      const unsubmitted = filtered.filter(function(n) { return submitted.indexOf(n) === -1; });
      const alertBar = document.getElementById('alertBar');
      const alertChips = document.getElementById('alertChips');
      if (unsubmitted.length > 0) {
        alertBar.classList.remove('hidden');
        alertChips.innerHTML = unsubmitted.map(function(n) { return '<span class="alert-chip">' + n + '</span>'; }).join('');
      } else {
        alertBar.classList.add('hidden');
      }
      // 18時アラート更新
      const now = new Date();
      const timeAlert = document.getElementById('timeAlert');
      const timeChips = document.getElementById('timeAlertChips');
      if (now.getHours() >= 18 && unsubmitted.length > 0) {
        timeAlert.classList.remove('hidden');
        timeChips.innerHTML = unsubmitted.map(function(n) { return '<span class="alert-chip">' + n + '</span>'; }).join('');
      } else {
        timeAlert.classList.add('hidden');
      }
    }
  });
}

function checkAlert() {
  updateSubmitUI('tomorrow');
}

function checkTimeAlert() {
  updateSubmitUI('tomorrow');
}

setInterval(function() { checkTimeAlert(); }, 60000);
init();
</script>
